<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Facebook Open Graph Meta Tags -->
    <meta property="og:url" content="https://fifaworldcup2026-hazel.vercel.app" />
    <meta property="og:title" content="FIFA World Cup 2026 - Live Scores & Schedule" />
    <meta property="og:description" content="Follow every match, live scores, and standings from the 2026 FIFA World Cup!" />
    <meta property="og:image" content="https://placehold.co/1200x630/009b3a/FFD700?text=FIFA+World+Cup+2026+Live" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    
    <title>World Cup 2026 - Live Scores</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d3b1a 0%, #1a472a 50%, #0d3b1a 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 15px;
            color: white;
        }

        .header .trophy { font-size: 48px; margin-bottom: 8px; }
        .header h1 { font-size: 28px; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .header p { font-size: 14px; opacity: 0.9; }

        /* Live Badge */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e74c3c;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 16px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            margin-left: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Group Section */
        .group-section {
            background: white;
            border-radius: 16px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .group-header {
            background: linear-gradient(90deg, #009b3a, #1a5f2a);
            color: white;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Match Card */
        .match-card {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f2f5;
            transition: background 0.2s;
        }

        .match-card:hover {
            background: #f8f9fa;
        }

        .match-card:last-child {
            border-bottom: none;
        }

        .match-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 600;
            flex-wrap: wrap;
        }

        .status-live { color: #e74c3c; }
        .status-finished { color: #27ae60; }
        .status-upcoming { color: #7f8c8d; }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 8px;
        }

        .team-side {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .team-side:last-child {
            justify-content: flex-end;
            flex-direction: row-reverse;
        }

        .team-side:last-child .team-name {
            text-align: right;
        }

        .team-flag {
            font-size: 28px;
            flex-shrink: 0;
            width: 36px;
            text-align: center;
        }

        .team-name {
            font-size: 15px;
            font-weight: 700;
            color: #1c1e21;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-box {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .score {
            font-size: 24px;
            font-weight: 800;
            color: #1c1e21;
            min-width: 30px;
            text-align: center;
        }

        .score-divider {
            font-size: 18px;
            color: #bdc3c7;
            font-weight: 300;
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #65676b;
            flex-wrap: wrap;
            gap: 8px;
        }

        .match-time {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Facebook Share Button */
        .fb-share-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .fb-share-btn:hover {
            background: #166fe5;
            transform: translateY(-1px);
        }

        .fb-share-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        /* Standings Table */
        .standings {
            padding: 16px 20px;
            background: #f8f9fa;
        }

        .standings h3 {
            font-size: 13px;
            color: #65676b;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-row {
            display: grid;
            grid-template-columns: 25px 1fr 30px 30px 30px 30px 40px;
            gap: 6px;
            padding: 6px 0;
            font-size: 13px;
            align-items: center;
            border-bottom: 1px solid #e4e6eb;
        }

        .table-row:last-child { border-bottom: none; }
        .table-row.header-row { font-weight: 700; color: #65676b; font-size: 11px; }
        .table-row .team-cell { display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .table-row .flag-small { font-size: 18px; }
        .pts { font-weight: 800; color: #1877f2; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1c1e21;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Refresh Button */
        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 600px) {
            body { padding: 10px; }
            
            .header { padding: 20px 10px; }
            .header .trophy { font-size: 36px; }
            .header h1 { font-size: 22px; }
            .header p { font-size: 12px; }
            
            .group-header { padding: 12px 16px; font-size: 14px; }
            
            .match-card { padding: 12px 16px; }
            
            .team-flag { font-size: 24px; width: 30px; }
            .team-name { font-size: 13px; }
            .score { font-size: 20px; min-width: 24px; }
            
            .match-info { font-size: 11px; }
            .fb-share-btn { padding: 6px 12px; font-size: 12px; }
            
            .table-row { 
                grid-template-columns: 20px 1fr 25px 25px 25px 25px 35px; 
                font-size: 12px; 
                gap: 4px;
            }
            .table-row .flag-small { font-size: 16px; }
            
            .refresh-btn { 
                top: 10px; 
                right: 10px; 
                padding: 8px 12px; 
                font-size: 12px; 
            }
        }

        @media (max-width: 400px) {
            .team-name { font-size: 12px; }
            .score { font-size: 18px; }
            .fb-share-btn span { display: none; }
            .fb-share-btn { padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="trophy">🏆</div>
            <div class="live-badge">
                <div class="live-dot"></div>
                LIVE NOW
            </div>
            <h1>FIFA World Cup 2026</h1>
            <p>USA · Canada · Mexico | June 11 - July 19, 2026</p>
        </div>

        <!-- Refresh Button -->
        <button class="refresh-btn" onclick="loadData()" id="refreshBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            <span>Refresh</span>
        </button>

        <!-- Loading State -->
        <div class="loading" id="loading">Loading live data...</div>

        <!-- Content Container -->
        <div id="content" style="display: none;"></div>

        <!-- Error State -->
        <div class="error" id="error" style="display: none;">
            Failed to load data. Please check your connection and try again.
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✅ Opening Facebook Share...</div>

    <script>
        // ==========================================
        // FREE WORLD CUP 2026 API - NO KEY NEEDED!
        // API: https://worldcup26.ir
        // GitHub: https://github.com/rezarahiminia/worldcup2026
        // ==========================================
        
        const API_BASE = 'https://worldcup26.ir';
        const SITE_URL = 'https://fifaworldcup2026-hazel.vercel.app';

        // Fetch data from API
        async function fetchData(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

        // Load all data
        async function loadData() {
            const refreshBtn = document.getElementById('refreshBtn');
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            const error = document.getElementById('error');

            // Show loading
            refreshBtn.classList.add('spinning');
            loading.style.display = 'block';
            content.style.display = 'none';
            error.style.display = 'none';

            // Fetch matches and groups in parallel
            const [matchesData, groupsData] = await Promise.all([
                fetchData('/get/games'),
                fetchData('/get/groups')
            ]);

            refreshBtn.classList.remove('spinning');

            if (!matchesData || !matchesData.games) {
                loading.style.display = 'none';
                error.style.display = 'block';
                return;
            }

            // Process and render data
            const matches = matchesData.games;
            const groups = groupsData?.groups || {};

            renderContent(matches, groups);
            
            loading.style.display = 'none';
            content.style.display = 'block';
        }

        // Render all content
        function renderContent(matches, groups) {
            const container = document.getElementById('content');
            container.innerHTML = '';

            // Group matches by group letter
            const groupedMatches = {};
            matches.forEach(match => {
                const group = match.group || 'Other';
                if (!groupedMatches[group]) groupedMatches[group] = [];
                groupedMatches[group].push(match);
            });

            // Sort groups alphabetically
            const sortedGroups = Object.keys(groupedMatches).sort();

            sortedGroups.forEach(groupName => {
                const groupMatches = groupedMatches[groupName];
                const groupDiv = document.createElement('div');
                groupDiv.className = 'group-section';

                // Group header
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `📊 GROUP ${groupName}`;
                groupDiv.appendChild(header);

                // Matches
                groupMatches.forEach(match => {
                    groupDiv.appendChild(createMatchCard(match));
                });

                // Standings (if available)
                if (groups[groupName]) {
                    groupDiv.appendChild(createStandings(groups[groupName]));
                }

                container.appendChild(groupDiv);
            });
        }

        // Create match card HTML
        function createMatchCard(match) {
            const card = document.createElement('div');
            card.className = 'match-card';

            const isFinished = match.finished === 'TRUE' || match.finished === true;
            const isLive = match.time_elapsed && match.time_elapsed !== 'notstarted' && !isFinished;
            const isUpcoming = !isFinished && !isLive;

            const statusClass = isLive ? 'status-live' : isFinished ? 'status-finished' : 'status-upcoming';
            const statusText = isLive ? `● LIVE ${match.time_elapsed}'` : isFinished ? '● FULL TIME' : '● UPCOMING';

            const homeScore = isFinished || isLive ? (match.home_score || '0') : '-';
            const awayScore = isFinished || isLive ? (match.away_score || '0') : '-';
            const scoreColor = isUpcoming ? 'style="color:#bdc3c7"' : '';

            const dateStr = match.local_date || 'TBD';
            const stadium = match.stadium_id || '';

            // Get team names
            const homeTeam = match.home_team_name_en || match.home_team || 'TBD';
            const awayTeam = match.away_team_name_en || match.away_team || 'TBD';

            // Get flag emojis (simplified mapping)
            const homeFlag = getFlag(match.home_team_name_en || match.home_team);
            const awayFlag = getFlag(match.away_team_name_en || match.away_team);

            card.innerHTML = `
                <div class="match-status">
                    <span class="${statusClass}">${statusText}</span>
                    <span>${dateStr}</span>
                </div>
                <div class="match-teams">
                    <div class="team-side">
                        <span class="team-flag">${homeFlag}</span>
                        <span class="team-name">${homeTeam}</span>
                    </div>
                    <div class="score-box">
                        <span class="score" ${scoreColor}>${homeScore}</span>
                        <span class="score-divider">${isUpcoming ? 'vs' : '-'}</span>
                        <span class="score" ${scoreColor}>${awayScore}</span>
                    </div>
                    <div class="team-side">
                        <span class="team-name">${awayTeam}</span>
                        <span class="team-flag">${awayFlag}</span>
                    </div>
                </div>
                <div class="match-info">
                    <span class="match-time">🏟️ ${stadium}</span>
                    <button class="fb-share-btn" onclick="shareMatch('${homeTeam}', '${awayTeam}', '${homeScore}-${awayScore}', 'Group ${match.group} - ${dateStr}')">
                        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                        <span>Share</span>
                    </button>
                </div>
            `;

            return card;
        }

        // Create standings table
        function createStandings(groupData) {
            const div = document.createElement('div');
            div.className = 'standings';

            let html = '<h3>Group Standings</h3>';
            html += '<div class="table-row header-row">';
            html += '<span>#</span><span>Team</span><span>P</span><span>W</span><span>D</span><span>L</span><span class="pts">PTS</span>';
            html += '</div>';

            // Sort by points (descending)
            const sorted = Object.entries(groupData).sort((a, b) => (b[1].points || 0) - (a[1].points || 0));

            sorted.forEach(([, team], index) => {
                const flag = getFlag(team.name);
                html += `<div class="table-row">
                    <span>${index + 1}</span>
                    <div class="team-cell"><span class="flag-small">${flag}</span> ${team.name || 'TBD'}</div>
                    <span>${team.played || 0}</span>
                    <span>${team.won || 0}</span>
                    <span>${team.drawn || 0}</span>
                    <span>${team.lost || 0}</span>
                    <span class="pts">${team.points || 0}</span>
                </div>`;
            });

            div.innerHTML = html;
            return div;
        }

        // Simple flag emoji mapping
        function getFlag(teamName) {
            const flags = {
                'Mexico': '🇲🇽', 'South Africa': '🇿🇦', 'South Korea': '🇰🇷', 'Czech Republic': '🇨🇿',
                'Canada': '🇨🇦', 'Switzerland': '🇨🇭', 'Bosnia and Herzegovina': '🇧🇦', 'Qatar': '🇶🇦',
                'Brazil': '🇧🇷', 'Morocco': '🇲🇦', 'Haiti': '🇭🇹', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
                'USA': '🇺🇸', 'Paraguay': '🇵🇾', 'Australia': '🇦🇺', 'Turkey': '🇹🇷', 'Türkiye': '🇹🇷',
                'Germany': '🇩🇪', 'Curaçao': '🇨🇼', 'Ivory Coast': '🇨🇮', 'Ecuador': '🇪🇨',
                'Netherlands': '🇳🇱', 'Japan': '🇯🇵', 'Tunisia': '🇹🇳', 'Sweden': '🇸🇪',
                'Belgium': '🇧🇪', 'Egypt': '🇪🇬', 'Iran': '🇮🇷', 'New Zealand': '🇳🇿',
                'Spain': '🇪🇸', 'Cape Verde': '🇨🇻', 'Saudi Arabia': '🇸🇦', 'Uruguay': '🇺🇾',
                'France': '🇫🇷', 'Senegal': '🇸🇳', 'Norway': '🇳🇴', 'Iraq': '🇮🇶',
                'Argentina': '🇦🇷', 'Algeria': '🇩🇿', 'Austria': '🇦🇹', 'Jordan': '🇯🇴',
                'Portugal': '🇵🇹', 'Colombia': '🇨🇴', 'Uzbekistan': '🇺🇿', 'Congo DR': '🇨🇩',
                'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Croatia': '🇭🇷', 'Ghana': '🇬🇭', 'Panama': '🇵🇦'
            };
            return flags[teamName] || '⚽';
        }

        // Share on Facebook
        function shareMatch(team1, team2, score, groupInfo) {
            const isTBD = score === '-/-' || score.includes('TBD');
            const matchText = isTBD 
                ? `🏆 ${team1} vs ${team2} - ${groupInfo}`
                : `🏆 ${team1} ${score} ${team2} - ${groupInfo}`;
            
            const description = isTBD
                ? `Don't miss ${team1} vs ${team2} at the FIFA World Cup 2026!`
                : `What a match! ${team1} ${score} ${team2} at the FIFA World Cup 2026!`;
            
            const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SITE_URL)}&quote=${encodeURIComponent(matchText + '\n\n' + description)}`;
            
            window.open(shareUrl, 'fb-share', 'width=626,height=436');
            
            showToast(`Sharing: ${team1} vs ${team2}`);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Auto-refresh every 60 seconds during tournament
        setInterval(() => {
            loadData();
        }, 60000);

        // Initial load
        loadData();
    </script>

</body>
</html>
